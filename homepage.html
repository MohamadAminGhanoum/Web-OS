<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name=" viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-system</title>

    </head>

    <div class="Topbar" id="topBar">

        <p class="topbarcontent">Web-system</p>
        <div class="battery">
            <div class="batteryJuice" id="batteryJuice"></div>
            <span style="position: absolute; color: white; font-size: 12px;"></span>
        </div>
        <p class="topbarcontent" id="time">27/92/2026 3:41 PM</p>

    </div>


    <style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: rgb(0, 0, 0);
            background-image: url('background.png'); 
            background-size: cover; 
            background-attachment: fixed;
        }


        .Topbar {
            display: flex;
            justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.25);
            color: rgb(0, 0, 0);
            padding: 4px;
            backdrop-filter: blur(10px);
            width: 100%;
            position: relative;
        }

        .topbarcontent {
            border: 1px solid rgb(126, 156, 177);
            padding: 5px 10px;
            border-radius: 20px;
            background-color: rgba(63, 59, 59, 0.3);
            cursor: pointer;
        }

        .battery {
            width: 45px;
            height: 24px;
            border: 2px solid rgb(255, 255, 255);
            border-radius: 4px;
            background-color: transparent;
            position: relative;
            padding: 3px;
        }

        .batteryJuice {
            height: 100%;
            border-radius: 2px;
            position: absolute;
            top: 0;
            left: 0;
            transition: width 0.8s ease, background-color 0.9s ease;
        }

        .closeScreen {
            border: 1px solid rgb(152, 111, 111);
            padding: 5px 5px;
            border-radius: 20px;
            margin-right: 5px;
            background-color: rgb(206, 0, 0);
            cursor: pointer;
        }

        .desktopApp {
            border-radius: 20px;
            cursor: pointer;
            width: 70px;
            text-align: center;;
            transition: transform 0.3s ease, margin 0.3s ease;
            transform-origin: bottom center;
        }

    .desktopApp:hover {
        transform: scale(1.5);
        margin: 0 15px;
    }

        .Appwindowheader {
            border-radius: 20px 20px 0px 0px;
            background-color: rgba(63, 59, 59, 0.3);
            color: rgb(255, 255, 255);
            width: 100%; 
            display: flex; 
            align-items: center; 
            cursor: move; 
            justify-content: space-between; 
            flex-direction: row;
            padding: 5px;
        }

        .Appwindow {
            border: 1px solid rgb(152, 111, 111);
            border-radius: 20px;
            background-color: rgba(1, 1, 17, 0.6);
            color: rgb(255, 255, 255);
            backdrop-filter: blur(15px);
            width: 750px; 
            height: 550px; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: auto;
        }

        .Bottombar {
            padding: 1px;
            left: 40px;
            right: 40px;
            background-color: rgba(0, 0, 0, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            bottom: 14px;
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgb(126, 156, 177);
        }
    </style>



<body>

    <div class="Bottombar" id="Bottombar">

<div id="desktopApp" onclick="handleAppClick(this, 'Appwindow')">
<img class="desktopApp" src="notesapp.png"/>
    </div>

    <div id="desktopApp2" onclick="handleAppClick(this, 'Appwindow2')">
        <img class="desktopApp" src="83197_calculator_1024x1024.png"/>
</div>

<div id="desktopApp3" onclick="handleAppClick(this, 'Appwindow3')">
        <img class="desktopApp" src="settings.png"/>
</div>
</div>

    <div id="Appwindow" class="Appwindow">
<div id="Appwindowheader" class="Appwindowheader">
    <div style="width: 16px;"></div>
    <p>Notes</p>
        <button class="closeScreen" id="closeScreen"></button>
</div>

<div class="notes" style="display: flex; width: 100%; height:100%;">
    <div id="sidebar" style="width: 150px; padding: 16px; background-color: rgba(63, 59, 59, 0.6); backdrop-filter: blur(10px); color: aliceblue; border-radius: 0px 0px 0px 20px; cursor: pointer;" ></div>
    <div contenteditable="true" id="Notes" style="overflow-y: scroll; padding: 14px 14px; width: calc(100% - 150px); text-align: left;"></div>
</div>
</div>

<div id="Appwindow2" class="Appwindow">
    <div id="Appwindowheader2" class="Appwindowheader">
        <div style="width: 16px;"></div>
        <p>Calculator</p>
        <button class="closeScreen" id="closeScreen2"></button>
    </div>
    <div class="Calculator">
    </div>
    </div>

    <div id="Appwindow3" class="Appwindow" style="align-items: flex-start;">
        <div id="Appwindowheader3" class="Appwindowheader">
            <div style="width: 16px;"></div>
            <p>Settings</p>
            <button class="closeScreen" id="closeScreen3" ></button>
        </div>
        <div id="settingsSidebar" class="settingsSidebar">
            <div>
                <div class="settingsSidebarContent">About</div>
                <div  class="settingsSidebarContent">Help</div>
                <div class="settingsSidebarContent">Feedback</div>
                <div class="settingsSidebarContent">Dark Mode</div>
            </div>
                </div>

<div>

    <label class="switchDarkMode">
        <input type="checkbox" onchange="turnToDarkmode()">
        <span class="slider"></span>
    </label>
</div>
    </div>
        <script src="script.js"></script>

        <style>
            .settingsSidebarContent:hover {
                background-color: rgba(63, 59, 59, 0.6);
            }
            .settingsSidebar {
                width: 150px;
                height: 100%;
                padding: 16px;
                backdrop-filter: blur(10px);
                background-color: rgba(63, 59, 59, 0.6);
                backdrop-filter: blur(10px);
                color: aliceblue;
                border-radius: 0px 0px 0px 20px;
                display: flex;
                transition: background-color 0.3s ease;
            }
.settingsSidebarContent {
    padding: 10px 22px;
    margin-bottom: 5px;
    background-color: rgba(63, 59, 59, 0.3);
    display: flex;
    flex-direction: column;
    color: aliceblue;
    font-size: 14px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    border-radius: 8px;
}

            .switchDarkMode {
                position: relative;
                display: inline-block;
                width: 60px;
                height: 34px;
            }
            .switchDarkMode input {
                opacity: 0;
                width: 0;
                height: 0;
            }

            .slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #ccc;
                transition: .4s;
                border-radius: 34px;
                align-items: center !important;
            }

            .slider:before {
                position: absolute;
                content: "";
                height: 26px;
                width: 26px;
                left: 4px;
                bottom: 4px;
                background-color: white;
                transition: .4s;
                border-radius: 50%;
            }
            .switchDarkMode input:checked + .slider {
                background-color: #2196F3;
            }
            .switchDarkMode input:checked + .slider:before {
                transform: translateX(26px);
            }
            
    
  .dark-mode .Topbar {
    background-color: rgba(255, 255, 255, 0.25) !important;
    color: rgb(255, 255, 255) !important;
    transition: background-color 0.5s ease, color 0.5s ease;
  }
  .dark-mode .Bottombar {
    background-color: rgba(255, 255, 255, 0.25) !important;
    color: rgb(0, 0, 0) !important;
    transition: background-color 0.5s ease, color 0.5s ease;
  }
 .dark-mode .Appwindow {
    background-color: rgba(255, 255, 255, 0.6) !important;
    color: rgb(0, 0, 0) !important;
    transition: background-color 0.5s ease, color 0.5s ease;
  }
  .dark-mode .Appwindowheader {
    background-color: rgba(255, 255, 255, 0.3) !important;
    color: rgb(0, 0, 0) !important;
    transition: background-color 0.5s ease, color 0.5s ease;
  }
  .dark-mode {
    background-image: url('lightBG.webp') !important;
    background-size: cover !important;
    background-attachment: fixed !important;
    transition: background-image 0.5s ease;
  }
              .dark-mode .battery span {
                color: rgb(8, 7, 7) !important;
            }

            .dark-mode #Notes {
                color: rgb(0, 0, 0) !important;
            }

        </style>
</body>

</html>
