<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name=" viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-system</title>

    </head>

    <div class="Topbar" id="topBar">

        <p class="topbarcontent">Web-system</p>
        <p class="topbarcontent" id="time">27/92/2026 3:41 PM</p>

    </div>


    <style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: rgb(0, 0, 0);
            background-image: url('background.png'); 
            background-size: cover; 
            background-attachment: fixed;
        }


        .Topbar {
            display: flex;
            justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.25);
            color: rgb(0, 0, 0);
            padding: 4px;
            backdrop-filter: blur(10px);
            width: 100%;
            position: relative;
        }

        .topbarcontent {
            border: 1px solid rgb(152, 111, 111);
            padding: 5px 10px;
            border-radius: 20px;
            background-color: rgba(63, 59, 59, 0.3);
            cursor: pointer;
        }

        .closeScreen {
            border: 1px solid rgb(152, 111, 111);
            padding: 5px 5px;
            border-radius: 20px;
            margin-right: 5px;
            background-color: rgb(206, 0, 0);
            cursor: pointer;
        }

        .desktopApp {
            padding: 20px 20px;
            border: 1px solid rgb(152, 111, 111);
            border-radius: 20px;
            background-color: rgba(63, 59, 59, 0.3);
            cursor: pointer;
            width: 120px;
            text-align: center;
            margin: 20px;
            justify-content: space-between;
        }

        .Appwindowheader {
            border-radius: 20px 20px 0px 0px;
            background-color: rgba(63, 59, 59, 0.3);
            color: rgb(0, 0, 0);
            width: 100%; 
            display: flex; 
            align-items: center; 
            cursor: move; 
            justify-content: space-between; 
            flex-direction: row;
            padding: 5px;
        }

        .Appwindow {
            border: 1px solid rgb(152, 111, 111);
            border-radius: 20px;
            background-color: rgba(63, 59, 59, 0.6);
            color: rgb(0, 0, 0);
            width: 550px; 
            height: 550px; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>



<body>
    <h1>Welcome to the Web-system</h1>
    <p>This is the homepage of the Web-system.</p>

<div class="desktopApp" id="desktopApp" onclick="handleAppClick(this, 'Appwindow')">
<p>Journaling app</p>

    <div id="Appwindow" class="Appwindow">
<div id="Appwindowheader" class="Appwindowheader">
    <div style="width: 16px;"></div>
    <p>Journaling.</p>
        <button class="closeScreen" id="closeScreen"></button>
</div>

<div class="notes" style="display: flex; width: 100%; height:100%;">
    <div id="sidebar" style="width: 150px; padding: 16px;"></div>
    <div id="journals" style="overflow-y: scroll;"></div>
</div>
</div>
    </div>
        <script src="script.js"></script>

</body>

</html>
